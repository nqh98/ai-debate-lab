# AI Debate Lab agent roster.
# Agents are named after the platform/CLI that powers them.
# No model names are pinned here: each platform auto-selects the most
# appropriate model per debate task — strongest for propose/critique/revise,
# cheapest for nominate/vote. Models are discovered at runtime via
# `models_command` (CLI backends that can list their models) or the
# provider's models endpoint (API backends); platforms that can't report
# models use their own default routing. Add `model: <name>` to pin one.
# API keys come from environment variables only.
agents:
  - name: claude
    backend: cli
    command: ["claude", "-p", "{prompt}"]
    enabled: true

  - name: codex
    backend: auto              # codex CLI if installed, else OpenAI API key
    command: ["codex", "exec", "--skip-git-repo-check", "{prompt}"]
    provider: openai
    api_key_env: OPENAI_API_KEY
    enabled: true

  - name: antigravity          # Antigravity CLI (agy) drives Gemini
    backend: cli
    command: ["agy", "--model={model}", "-p", "{prompt}"]
    models_command: ["agy", "models"]
    enabled: true

  - name: grok
    backend: auto              # grok CLI if installed, else xAI API key
    command: ["grok", "-p", "{prompt}"]
    provider: openai          # xAI's API is OpenAI-compatible
    base_url: https://api.x.ai/v1
    api_key_env: XAI_API_KEY
    enabled: false
